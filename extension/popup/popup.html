<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Campus SSO Helper</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main>
      <header>
        <img src="../icons/icon.svg" alt="" />
        <div>
          <h1>Campus SSO</h1>
          <p>Login Helper</p>
        </div>
      </header>

      <form id="settings-form">
        <label class="toggle-row">
          <span>自動ログイン</span>
          <input id="enabled" type="checkbox" />
        </label>

        <label>
          大学メールアドレス
          <input id="user-id" type="email" autocomplete="username" placeholder="大学のメールアドレス" required />
        </label>

        <label>
          パスワード
          <input id="password" type="password" autocomplete="current-password" placeholder="変更するときだけ入力" />
        </label>
        <p id="password-note" class="note"></p>

        <button class="primary" type="submit">設定を保存</button>
      </form>

      <p id="status" role="status" aria-live="polite"></p>

      <div class="actions">
        <button id="open-moodle" type="button">対象サイトを開く</button>
        <button id="clear-settings" class="danger" type="button">資格情報を削除</button>
      </div>

      <section class="notice" aria-label="セキュリティ情報">
        <strong>パスワードの保存について</strong>
        <p>資格情報はこのSafari拡張機能のローカル領域に保存され，Microsoftのログイン画面への自動入力だけに使用されます。</p>
      </section>
      <p class="disclaimer">本拡張機能は対象教育機関およびMicrosoftの公式アプリではありません。</p>
    </main>
    <script src="../core.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
